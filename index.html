<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Livre de recettes</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="conteneur">
      <header class="entete">
        <h1>Mon livre de recettes</h1>
        <p>Ajoutez vos recettes pour les retrouver pendant votre visite.</p>
      </header>

      <section class="section" aria-labelledby="titre-ajout">
        <h2 id="titre-ajout">Ajouter une recette</h2>

        <form id="formulaire-recette">
          <div class="champ-formulaire">
            <label for="nom-recette">Nom de la recette</label>
            <input id="nom-recette" name="nom" type="text" required>
          </div>

          <div class="champ-formulaire">
            <label for="categorie-recette">Catégorie</label>
            <select id="categorie-recette" name="categorie" required>
              <option value="">Choisir une catégorie</option>
              <option value="Entrée">Entrée</option>
              <option value="Plat">Plat</option>
              <option value="Dessert">Dessert</option>
              <option value="Encas">Encas</option>
            </select>
          </div>

          <fieldset class="premier-ingredient">
            <legend>Premier ingrédient</legend>
            <div class="champs-ingredient">
              <div class="champ-formulaire">
                <label for="ingredient-nom">Nom de l’ingrédient</label>
                <input id="ingredient-nom" name="ingredient-nom" type="text">
              </div>

              <div class="champ-formulaire">
                <label for="ingredient-quantite">Quantité</label>
                <input
                  id="ingredient-quantite"
                  name="ingredient-quantite"
                  type="number"
                  min="0"
                  step="any"
                >
              </div>

              <div class="champ-formulaire">
                <label for="ingredient-unite">Unité</label>
                <select id="ingredient-unite" name="ingredient-unite">
                  <option value="">Choisir une unité</option>
                  <option value="mg">mg</option>
                  <option value="g">g</option>
                  <option value="kg">kg</option>
                  <option value="ml">ml</option>
                  <option value="cl">cl</option>
                  <option value="l">l</option>
                  <option value="pièce">pièce</option>
                  <option value="tranche">tranche</option>
                  <option value="gousse">gousse</option>
                  <option value="cuillère à café">cuillère à café</option>
                  <option value="cuillère à soupe">cuillère à soupe</option>
                  <option value="pincée">pincée</option>
                  <option value="boîte">boîte</option>
                  <option value="pot">pot</option>
                  <option value="sachet">sachet</option>
                </select>
              </div>
            </div>
          </fieldset>

          <div class="actions-formulaire">
            <button id="bouton-enregistrer" type="submit">Ajouter la recette</button>
            <button
              id="bouton-annuler-modification"
              class="bouton-annuler"
              type="button"
              hidden
            >
              Annuler la modification
            </button>
          </div>
        </form>

        <p id="message-formulaire" class="message" aria-live="polite"></p>
      </section>

      <section class="section" aria-labelledby="titre-recettes">
        <h2 id="titre-recettes">Mes recettes</h2>
        <div id="liste-recettes" class="liste-recettes">
          <p class="aucune-recette">Aucune recette n’est encore enregistrée.</p>
        </div>
      </section>
    </main>
  </body>
</html>
